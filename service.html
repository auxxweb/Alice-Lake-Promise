<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Example</title>
    <!-- Add CSS for font-awesome and RD Navbar if needed -->
    <link rel="stylesheet" href="path/to/font-awesome.css">
    <link rel="stylesheet" href="path/to/navbar.css">
</head>
<body>
    <!-- Outdated Browser Warning -->
    <div class="ie-panel">
        <a href="http://windows.microsoft.com/en-US/internet-explorer/">
            <img src="images/ie8-panel/warning_bar_0000_us.jpg" height="42" width="820" alt="You are using an outdated browser. For a faster, safer browsing experience, upgrade for free today.">
        </a>
    </div>

    <!-- Page Content -->
    <div class="page">
        <header class="section page-header">
            <!-- Navbar -->
            <div class="rd-navbar-wrap">
                <nav class="rd-navbar rd-navbar-corporate" data-layout="rd-navbar-fixed">
                    <!-- Toggle Button for Mobile -->
                    <div class="rd-navbar-collapse-toggle rd-navbar-fixed-element-1" data-rd-navbar-toggle=".rd-navbar-collapse">
                        <span></span>
                    </div>
                    <div class="rd-navbar-aside-outer">
                        <div class="rd-navbar-aside">
                            <!-- Navbar Panel with Brand -->
                            <div class="rd-navbar-panel">
                                <!-- Navbar Toggle for Mobile -->
                                <button class="rd-navbar-toggle" data-rd-navbar-toggle=".rd-navbar-nav-wrap"><span></span></button>
                                <!-- Brand Logo -->
                                <div class="rd-navbar-brand">
                                    <a class="brand" href="index.html">
                                        <img src="images/logo/logo.JPG" alt="Brand Logo" width="225" height="18"/>
                                    </a>
                                </div>
                            </div>

                            <!-- Contact Info -->
                            <div class="rd-navbar-aside-right rd-navbar-collapse">
                                <ul class="rd-navbar-corporate-contacts">
                                    <li>
                                        <div class="unit unit-spacing-xs">
                                            <div class="unit-left"><span class="icon fa fa-phone"></span></div>
                                            <div class="unit-body"><a class="link-phone" href="tel:#">9072100218</a></div>
                                        </div>
                                    </li>
                                </ul>

                                <!-- WhatsApp Button -->
                                <div>
                                    <a href="https://wa.me/1234567890" class="whatsapp-button" target="_blank">
                                        <i class="fab fa-whatsapp"></i>
                                    </a>
                                </div>
                            </div>
                            <!-- Styles for WhatsApp Button -->
                            <style>
                                .whatsapp-button {
                                    display: inline-flex;
                                    align-items: center;
                                    justify-content: center;
                                    width: 50px;
                                    height: 50px;
                                    border-radius: 50%;
                                    color: rgb(42, 235, 8);
                                    font-size: 24px;
                                    text-decoration: none;
                                    transition: transform 0.2s ease;
                                }
                                .whatsapp-button:hover {
                                    transform: scale(1.1);
                                }
                            </style>
                        </div>
                    </div>

                    <!-- Main Navbar -->
                    <div class="rd-navbar-main-outer">
                        <div class="rd-navbar-main">
                            <div class="rd-navbar-nav-wrap">
                                <!-- Social Links -->
                                <ul class="list-inline list-inline-md rd-navbar-corporate-list-social">
                                    <li><a class="icon fa fa-instagram" href="https://www.instagram.com/alicelakepromise?igsh=MnRqY2ZsaTdjMG5i"></a></li>
                                </ul>
                                <!-- Navbar Links -->
                                <ul class="rd-navbar-nav">
                                    <li class="rd-nav-item"><a class="rd-nav-link" href="index.html">Home</a></li>
                                    <li class="rd-nav-item"><a class="rd-nav-link" href="about.html">About</a></li>
                                    <li class="rd-nav-item"><a class="rd-nav-link" href="typography.html">Gallery</a></li>
                                    <li class="rd-nav-item active"><a class="rd-nav-link" href="contact-us.html">Contact Us</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>
        </header>
    </div>

    <!-- Link to jQuery and RD Navbar JavaScript -->
    <script src="path/to/jquery.min.js"></script>
    <script src="path/to/rd-navbar.js"></script>
    <script>
        // Initialize RD Navbar if required by adding the appropriate jQuery setup
        $(document).ready(function() {
            $('.rd-navbar').RDNavbar();
        });
    </script>
</body>
</html>
